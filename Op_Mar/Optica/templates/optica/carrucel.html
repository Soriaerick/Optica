<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel Automático</title>

    <style>

    body{
        margin:0;
        font-family: Arial;
    }

    #slider {
        width: 100%;
        max-width: 900px;
        margin: auto;
        overflow: hidden;
    }

    #slider figure {
        display: flex;
        width: 300%;
        animation: slider 12s infinite;
    }

    #slider img {
        width: 100%;
        height: 400px;
        object-fit: cover;
    }

    @keyframes slider {
        0% { transform: translateX(0); }
        33% { transform: translateX(0); }

        38% { transform: translateX(-100%); }
        66% { transform: translateX(-100%); }

        71% { transform: translateX(-200%); }
        100% { transform: translateX(-200%); }
    }


    </style>
</head>
<body>

    <div id="slider">
        <div id="slider">
            <figure>
                <img src="static/images/OIP.png">
                <img src="static/images/Cover.png">
                <img src="static/images/entrada-lentes-contacto.jpg">
            </figure>
        </div>
    </div>
    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
