<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrusel Automático</title>

    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    #slider {
        width: 100%;
        max-width: 900px;
        margin: auto;
        overflow: hidden; /* Esconde las imágenes que no están a la vista */
    }

    #slider figure {
        display: flex;
        width: 300%; /* Tres imágenes = 300% */
        margin: 0;
        padding: 0;
        animation: slider 15s infinite; /* Reduje el tiempo de 50s a 15s para que no sea tan lento */
    }

    #slider img {
        /* Importante: Cada imagen debe ocupar 1/3 del contenedor de 300% */
        width: calc(100% / 3); 
        height: 400px;
        object-fit: cover;
    }

    @keyframes slider {
        /* Primera imagen */
        0% { transform: translateX(0); }
        30% { transform: translateX(0); }

        /* Transición a la segunda */
        33% { transform: translateX(-33.33%); }
        63% { transform: translateX(-33.33%); }

        /* Transición a la tercera */
        66% { transform: translateX(-66.66%); }
        96% { transform: translateX(-66.66%); }

        /* Regreso al inicio */
        100% { transform: translateX(0); }
    }
    </style>
</head>
<body>

    <div id="slider">
        <figure>
            <img src="static/images/OIP.png" alt="Imagen 1">
            <img src="static/images/promo.jpg" alt="Imagen 2">
            <img src="static/images/sin.jpg" alt="Imagen 3">
        </figure>
    </div>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
