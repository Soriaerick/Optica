{% extends 'optica/base.html' %}

{% load static %}

{% block content %}
<div class="carousel-container">
    <div class="carousel-slides">
        <div class="carousel-slide active">
            <img src="{% static 'images/optica1.jpg' %}" alt="Óptica - Modelo 1">
            <div class="carousel-caption">
                <h3>Bienvenido a Óptica Marquez</h3>
                <p>La mejor calidad en lentes y monturas</p>
            </div>
        </div>
        <div class="carousel-slide">
            <img src="{% static 'images/optica2.jpg' %}" alt="Óptica - Modelo 2">
            <div class="carousel-caption">
                <h3>Protección UV</h3>
                <p>Cuidamos tus ojos con la mejor tecnología</p>
            </div>
        </div>
        <div class="carousel-slide">
            <img src="{% static 'images/optica3.jpg' %}" alt="Óptica - Modelo 3">
            <div class="carousel-caption">
                <h3>Estilo y comodidad</h3>
                <p>Descubre nuestras últimas colecciones</p>
            </div>
        </div>
    </div>
    <!-- Controles -->
    <button class="carousel-control prev">&#10094;</button>
    <button class="carousel-control next">&#10095;</button>
    <!-- Indicadores -->
    <div class="carousel-indicators">
        <span class="indicator active"></span>
        <span class="indicator"></span>
        <span class="indicator"></span>
    </div>
</div>

<!-- Puedes agregar más contenido aquí si lo deseas, como información de contacto o servicios -->

<!-- ===== ESTILOS ADICIONALES PARA EL CARRUSEL ===== -->
<style>
    .carousel-container {
        position: relative;
        max-width: 100%;
        margin: 20px 0;
        overflow: hidden;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .carousel-slides {
        display: flex;
        transition: transform 0.5s ease;
    }

    .carousel-slide {
        min-width: 100%;
        position: relative;
    }

    .carousel-slide img {
        width: 100%;
        height: 400px;
        object-fit: cover;
        display: block;
    }

    .carousel-caption {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(0,0,0,0.5);
        color: white;
        padding: 15px 25px;
        border-radius: 8px;
        backdrop-filter: blur(5px);
    }

    .carousel-caption h3 {
        margin: 0 0 5px;
        font-size: 1.5rem;
    }

    .carousel-caption p {
        margin: 0;
        font-size: 1rem;
    }

    .carousel-control {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255,255,255,0.3);
        border: none;
        color: white;
        font-size: 2rem;
        padding: 10px 15px;
        cursor: pointer;
        border-radius: 50%;
        backdrop-filter: blur(5px);
        transition: background 0.3s;
        z-index: 10;
    }

    .carousel-control:hover {
        background: rgba(255,255,255,0.5);
    }

    .prev {
        left: 10px;
    }

    .next {
        right: 10px;
    }

    .carousel-indicators {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 10;
    }

    .indicator {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255,255,255,0.5);
        cursor: pointer;
        transition: background 0.3s;
    }

    .indicator.active {
        background: white;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .carousel-slide img {
            height: 250px;
        }
        .carousel-caption {
            padding: 10px;
            font-size: 0.9rem;
        }
        .carousel-caption h3 {
            font-size: 1.2rem;
        }
    }
</style>

<!-- ===== SCRIPT MEJORADO PARA EL CARRUSEL (SIN ONCLICK) ===== -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const slides = document.querySelectorAll('.carousel-slide');
        const slidesContainer = document.querySelector('.carousel-slides');
        const indicators = document.querySelectorAll('.indicator');
        const prevBtn = document.querySelector('.carousel-control.prev');
        const nextBtn = document.querySelector('.carousel-control.next');
        let slideIndex = 1;
        const totalSlides = slides.length;

        function showSlide(n) {
            if (n > totalSlides) slideIndex = 1;
            if (n < 1) slideIndex = totalSlides;
            const offset = (slideIndex - 1) * -100;
            slidesContainer.style.transform = `translateX(${offset}%)`;
            indicators.forEach((ind, i) => {
                ind.classList.toggle('active', i === slideIndex - 1);
            });
        }

        function moveSlide(step) {
            slideIndex += step;
            showSlide(slideIndex);
        }

        function currentSlide(n) {
            slideIndex = n;
            showSlide(slideIndex);
        }

        // Event listeners
        if (prevBtn) prevBtn.addEventListener('click', () => moveSlide(-1));
        if (nextBtn) nextBtn.addEventListener('click', () => moveSlide(1));
        indicators.forEach((ind, i) => {
            ind.addEventListener('click', () => currentSlide(i + 1));
        });

        // Inicializar
        showSlide(slideIndex);

        // Opcional: auto-play (descomenta si quieres)
        // setInterval(() => moveSlide(1), 5000);
    });
</script>
{% endblock %}
