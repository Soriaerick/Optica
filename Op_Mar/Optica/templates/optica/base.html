{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Óptica Marquez</title>

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <!-- CSS ESPECÍFICO POR PÁGINA -->
    {% block extra_css %}{% endblock %}
    
    <!-- Favicon -->
    <link rel="icon" href="{% static 'images/Optica.png' %}">
</head>
<body>

<header class="header">
    <div class="logo">
        <h1>Óptica Marquez</h1>
        <p>Tu visión, nuestra pasión</p>
    </div>

    <nav class="menu-superior">
        <ul>
            <li><a href="{% url 'inicio' %}" class="{% if request.resolver_match.url_name == 'inicio' %}active{% endif %}">Inicio</a></li>
            <li><a href="{% url 'productos' %}" class="{% if request.resolver_match.url_name == 'productos' %}active{% endif %}">Productos</a></li>
            <li><a href="{% url 'reparaciones' %}" class="{% if request.resolver_match.url_name == 'reparaciones' %}active{% endif %}">Reparaciones</a></li>
            <li><a href="{% url 'horarios' %}" class="{% if request.resolver_match.url_name == 'horarios' %}active{% endif %}">Horarios</a></li>
        </ul>
    </nav>
</header>

<main class="main-content">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
